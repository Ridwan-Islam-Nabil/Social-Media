<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-primary" data-bs-theme="dark">
    <div class="container"> 
        <a class="navbar-brand" routerLink="/" routerLinkActive="active">Social Media</a>

        <ul class="navbar-nav me-auto mb-2 mb-md-0">
            @if (accountService.currentUser()) {
                <li class="nav-item"> 
                    <a routerLink="/members" routerLinkActive="active" class="nav-link">Matches</a> 
                </li>
                <li class="nav-item"> 
                    <a routerLink="/lists" routerLinkActive="active" class="nav-link">Lists</a> 
                </li>
                <li class="nav-item"> 
                    <a routerLink="/messages" routerLinkActive="active" class="nav-link">Messages</a> 
                </li>
            }
        </ul>
        @if(accountService.currentUser()) {
            <div class="dropdown" dropdown>
                <a dropdownToggle class="dropdown-toggle text-light text-white">
                    Welcome {{accountService.currentUser()?.username | titlecase}}
                </a>
                <a *dropdownMenu class="dropdown-menu text-decoration-none">
                    <a class="dropdown-item">Edit Profile</a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" (click)="logout()">Logout</a>
                </a>
            </div>
        }
        @if(!accountService.currentUser()) {
            <form #loginForm="ngForm" (ngSubmit)="login()" class="d-flex">
                <input name="username" [(ngModel)]="model.username" class="form-control me-2 bg-secondary text-white" placeholder="Username">
                <input name="password" [(ngModel)]="model.password" class="form-control me-2 bg-secondary text-white" placeholder="Password" type="password">

                <button class="btn btn-success" type="submit">Login</button>
            </form>
        }
        
    </div>
</nav>
